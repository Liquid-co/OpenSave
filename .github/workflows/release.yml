name: Release builds

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write # needed to publish a GitHub Release

jobs:
  windows:
    runs-on: windows-latest
    # Expose whether a signing cert secret is configured (secrets can't be
    # read directly in step `if:`, so map it to job-level env here).
    env:
      HAS_SIGNING: ${{ secrets.WINDOWS_CERT_BASE64 != '' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.12.0
      # NSIS ships on the runner image but is not on PATH; without makensis
      # `wails build -nsis` silently skips the installer.
      - name: Ensure NSIS (makensis) is on PATH
        shell: bash
        run: |
          export PATH="$PATH:/c/Program Files (x86)/NSIS:/c/Program Files (x86)/NSIS/Bin"
          # chocolatey.org has intermittent 503s — retry, and fail THIS step
          # if makensis still isn't available (a late "installer missing"
          # failure after a full build wastes the whole job).
          for attempt in 1 2 3; do
            command -v makensis >/dev/null 2>&1 && break
            choco install nsis -y --no-progress && break
            echo "choco install nsis failed (attempt $attempt); retrying in 30s"
            sleep 30
          done
          if ! command -v makensis >/dev/null 2>&1; then
            echo "::error::makensis unavailable after 3 install attempts"
            exit 1
          fi
          echo 'C:\Program Files (x86)\NSIS' >> "$GITHUB_PATH"
          echo 'C:\Program Files (x86)\NSIS\Bin' >> "$GITHUB_PATH"
      - name: Build Windows app (NSIS installer + portable exe)
        working-directory: cmd/opensave-app
        shell: bash
        run: |
          V="${GITHUB_REF_NAME#v}"
          wails build -nsis -ldflags "-X github.com/opensave/opensave/internal/version.Version=$V -X github.com/opensave/opensave/internal/version.BuildTime=$(date +%s)"
      - name: Build CLI + relay
        run: |
          go build -ldflags="-s -w" -o dist/opensave-cli.exe ./cmd/opensave-cli
          go build -ldflags="-s -w" -o dist/opensave-relay.exe ./cmd/opensave-relay

      # Fail loudly if the NSIS installer was skipped, and give it a stable
      # download name (the website's download buttons look for "Setup").
      - name: Verify + rename installer
        shell: bash
        run: |
          ls -la cmd/opensave-app/build/bin/
          shopt -s nullglob
          inst=(cmd/opensave-app/build/bin/*installer*.exe)
          if [ ${#inst[@]} -eq 0 ]; then
            echo "::error::NSIS installer was not produced by wails build"
            exit 1
          fi
          size=$(stat -c%s "${inst[0]}")
          if [ "$size" -lt 5000000 ]; then
            echo "::error::installer is only $size bytes — payload missing"
            exit 1
          fi
          mv "${inst[0]}" cmd/opensave-app/build/bin/OpenSave.Setup.exe

      # Wails 2.12 doesn't reliably embed Windows versioninfo, so stamp it
      # onto the built binaries with rcedit (what electron-builder uses).
      - name: Stamp version metadata (rcedit)
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: |
          V="${GITHUB_REF_NAME#v}"
          # Windows file-versions must be numeric (x.y.z.w) — strip any
          # semver pre-release suffix ("2.1.0-beta.1" -> "2.1.0.0").
          FV="${V%%-*}.0"
          # the npm "rcedit" package is a library with no CLI — fetch the real binary
          curl -sL --retry 3 -o "$RUNNER_TEMP/rcedit.exe" \
            https://github.com/electron/rcedit/releases/download/v2.0.0/rcedit-x64.exe
          for exe in cmd/opensave-app/build/bin/*.exe; do
            # never touch the NSIS installer: rcedit strips the PE overlay
            # holding the compressed payload, leaving a 50 KB stub
            case "$exe" in *Setup*|*installer*) continue ;; esac
            "$RUNNER_TEMP/rcedit.exe" "$exe" \
              --set-version-string "ProductName" "OpenSave" \
              --set-version-string "CompanyName" "OpenSave" \
              --set-version-string "FileDescription" "OpenSave — peer-to-peer game save sync" \
              --set-version-string "LegalCopyright" "Copyright (c) 2026 Siva Prakash & OpenSave contributors" \
              --set-file-version "$FV" \
              --set-product-version "$V" \
              --set-icon "cmd/opensave-app/build/windows/icon.ico"
          done

      # Optional Authenticode signing — runs only when the repo has a
      # WINDOWS_CERT_BASE64 (+ WINDOWS_CERT_PASSWORD) secret configured.
      - name: Code sign (optional)
        if: env.HAS_SIGNING == 'true' && startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        env:
          WIN_CERT_B64: ${{ secrets.WINDOWS_CERT_BASE64 }}
          WIN_CERT_PW: ${{ secrets.WINDOWS_CERT_PASSWORD }}
        run: |
          $pfx = "$env:RUNNER_TEMP\cert.pfx"
          [IO.File]::WriteAllBytes($pfx, [Convert]::FromBase64String($env:WIN_CERT_B64))
          $signtool = (Get-ChildItem "C:\Program Files (x86)\Windows Kits\10\bin\*\x64\signtool.exe" | Select-Object -Last 1).FullName
          Get-ChildItem cmd/opensave-app/build/bin/*.exe | ForEach-Object {
            & $signtool sign /f $pfx /p $env:WIN_CERT_PW /fd SHA256 /tr http://timestamp.digicert.com /td SHA256 $_.FullName
          }

      - uses: actions/upload-artifact@v4
        with:
          name: windows
          path: |
            cmd/opensave-app/build/bin/*
            dist/*

  linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Install Wails + GTK/WebKit toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev
          go install github.com/wailsapp/wails/v2/cmd/wails@v2.12.0
      - name: Build Linux app
        working-directory: cmd/opensave-app
        run: |
          V="${GITHUB_REF_NAME#v}"
          wails build -tags webkit2_41 -ldflags "-X github.com/opensave/opensave/internal/version.Version=$V -X github.com/opensave/opensave/internal/version.BuildTime=$(date +%s)"
      - name: Build CLI + relay, assemble tar.gz
        run: |
          go build -ldflags="-s -w" -o dist/opensave-cli ./cmd/opensave-cli
          go build -ldflags="-s -w" -o dist/opensave-relay ./cmd/opensave-relay
          mkdir -p opensave-linux
          cp cmd/opensave-app/build/bin/OpenSave opensave-linux/opensave
          cp dist/opensave-cli dist/opensave-relay opensave-linux/
          # Desktop integration: launcher entry, icon, and a one-line installer.
          cp cmd/opensave-app/build/linux/opensave.desktop opensave-linux/
          cp cmd/opensave-app/build/linux/install-desktop.sh opensave-linux/
          cp cmd/opensave-app/build/appicon.png opensave-linux/opensave.png
          chmod +x opensave-linux/install-desktop.sh
          tar -czf opensave-linux-amd64.tar.gz opensave-linux
      - uses: actions/upload-artifact@v4
        with:
          name: linux
          path: opensave-linux-amd64.tar.gz

  # Flatpak bundle: the only install that works on a stock Steam Deck.
  # SteamOS ships no WebKitGTK and wipes pacman installs on OS updates; the
  # GNOME runtime provides libwebkit2gtk-4.1 (exactly what -tags webkit2_41
  # links), so the flatpak runs untouched across SteamOS updates.
  flatpak:
    needs: [linux]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: linux
          path: linux
      - name: Install flatpak-builder + GNOME runtime
        run: |
          sudo apt-get update
          sudo apt-get install -y flatpak flatpak-builder imagemagick
          # ubuntu-24.04 restricts unprivileged user namespaces, which
          # breaks bwrap (flatpak's sandbox) — relax it for this job.
          sudo sysctl kernel.apparmor_restrict_unprivileged_userns=0 || true
          flatpak remote-add --if-not-exists --user flathub https://dl.flathub.org/repo/flathub.flatpakrepo
          # Keep in sync with runtime-version in packaging/flatpak/*.yml.
          flatpak install --user -y --noninteractive flathub org.gnome.Platform//49 org.gnome.Sdk//49
      - name: Stage prebuilt binaries
        run: |
          V="${GITHUB_REF_NAME#v}"
          tar -xzf linux/opensave-linux-amd64.tar.gz
          mkdir -p packaging/flatpak/stage
          cp opensave-linux/opensave opensave-linux/opensave-cli \
             opensave-linux/opensave.desktop \
             packaging/flatpak/stage/
          # Flatpak export rejects icons over 512x512; the appicon is 1024.
          convert opensave-linux/opensave.png -resize 512x512 packaging/flatpak/stage/opensave.png
          sed "s/__VERSION__/$V/; s/__DATE__/$(date +%F)/" \
            packaging/flatpak/io.github.sivadaboi.OpenSave.metainfo.xml \
            > packaging/flatpak/stage/io.github.sivadaboi.OpenSave.metainfo.xml
      - name: Build bundle
        run: |
          flatpak-builder --user --force-clean --repo=flatpak-repo \
            flatpak-build packaging/flatpak/io.github.sivadaboi.OpenSave.yml
          flatpak build-bundle flatpak-repo OpenSave.flatpak io.github.sivadaboi.OpenSave
      - name: Smoke test (every linked library must resolve in the sandbox)
        run: |
          flatpak install --user -y --noninteractive ./OpenSave.flatpak
          flatpak run --command=sh io.github.sivadaboi.OpenSave -c 'ldd /app/bin/opensave' | tee ldd.out
          if grep -q "not found" ldd.out; then
            echo "::error::unresolved libraries inside the flatpak sandbox"
            exit 1
          fi
      - uses: actions/upload-artifact@v4
        with:
          name: flatpak
          path: OpenSave.flatpak

  relay-docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build relay image
        run: docker build -f relay/Dockerfile -t opensave-relay .

  # Publish a real GitHub Release with all downloadable assets on tag push.
  release:
    needs: [windows, linux, flatpak]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: windows
          path: windows
      - uses: actions/download-artifact@v4
        with:
          name: linux
          path: linux
      - uses: actions/download-artifact@v4
        with:
          name: flatpak
          path: flatpak
      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          name: OpenSave ${{ github.ref_name }}
          # Hyphenated tags (v2.1.0-beta.1) publish as pre-releases: the
          # in-app updater and /releases/latest both ignore them, so only
          # people who opt in manually get in-progress builds.
          prerelease: ${{ contains(github.ref_name, '-') }}
          # Note: re-publishing the same tag appends another generated-notes
          # block; if a tag is ever re-cut, tidy the release body by hand.
          generate_release_notes: true
          fail_on_unmatched_files: false
          files: |
            windows/**/*.exe
            linux/*.tar.gz
            flatpak/*.flatpak
